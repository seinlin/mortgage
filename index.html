<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage Calculator</title>
  <link rel="stylesheet" href="style/main.css">
  <script src="js/script.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Mortgage Calculator</h1>

    <div class="card">
      <form id="calcForm">
        <div class="section-title">Mortgage Details</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="totalAmount">Purchase Price ($)</label>
            <input type="number" id="totalAmount" min="0" step="1000" placeholder="300000" value="300000" required>
          </div>
          <div class="form-group">
            <label for="downPaymentPercent">Down Payment (%)</label>
            <input type="number" id="downPaymentPercent" min="0" max="100" step="0.5" placeholder="20" value="20">
          </div>
          <div class="form-group">
            <label for="interestRate">Annual Interest Rate (%)</label>
            <input type="number" id="interestRate" min="0" max="100" step="0.01" placeholder="5.9" value="5.9" required>
          </div>
          <div class="form-group">
            <label for="numYears">Loan Term (years)</label>
            <input type="number" id="numYears" min="1" max="50" step="1" placeholder="30" value="30" required>
          </div>
        </div>

        <div class="section-title">Monthly Costs (Optional)</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="hoa">HOA ($/month)</label>
            <input type="number" id="hoa" min="0" step="1" placeholder="0" value="0">
          </div>
          <div class="form-group">
            <label for="houseInsurance">House Insurance ($/month)</label>
            <input type="number" id="houseInsurance" min="0" step="1" placeholder="0" value="0">
          </div>
          <div class="form-group">
            <label for="propertyTax">Property Tax ($/month)</label>
            <input type="number" id="propertyTax" min="0" step="1" placeholder="0" value="0">
          </div>
          <div class="form-group">
            <label for="mortgageInsurance">Mortgage Insurance ($/month)</label>
            <input type="number" id="mortgageInsurance" min="0" step="1" placeholder="0" value="0">
          </div>
          <div class="form-group">
            <label for="utilities">Utilities ($/month)</label>
            <input type="number" id="utilities" min="0" step="1" placeholder="0" value="0">
          </div>
          <div class="form-group">
            <label for="others">Others ($/month)</label>
            <input type="number" id="others" min="0" step="1" placeholder="0" value="0">
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button type="submit" class="btn">Calculate</button>
          </div>
        </div>
        <p class="error-msg hidden" id="errorMsg"></p>
      </form>
    </div>

    <div class="card hidden" id="resultCard">
      <div class="section-title">Mortgage Summary</div>
      <div id="mortgageInfo" class="mortgage-table"></div>
      <div class="summary">
        <div class="summary-item highlight">
          <div class="label">Monthly Payment</div>
          <div class="value" id="monthlyPayment">--</div>
        </div>
        <div class="summary-item">
          <div class="label">Principal & Interest</div>
          <div class="value" id="piPayment">--</div>
        </div>
        <div class="summary-item">
          <div class="label">Total Interest</div>
          <div class="value" id="totalInterestDisplay">--</div>
        </div>
        <div class="summary-item">
          <div class="label">Total Payment</div>
          <div class="value" id="totalPaymentDisplay">--</div>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Month</th>
              <th>Principal</th>
              <th>Interest</th>
              <th>Mortgage Payment</th>
              <th>Mortgage Balance</th>
              <th>Total Payment</th>
            </tr>
          </thead>
          <tbody id="amortizationBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</body>
</html>
